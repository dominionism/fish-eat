<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>fish eat</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0a0a2e; display:flex; justify-content:center; align-items:center; height:100vh; font-family:"Segoe UI",sans-serif; overflow:hidden; }
canvas { border:2px solid #1a3a5c; border-radius:8px; box-shadow:0 0 40px rgba(0,100,200,0.3); }
</style>
</head>
<body>
<canvas id="game"></canvas>
<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");
canvas.width=900; canvas.height=550;
const W=canvas.width, H=canvas.height;
let state="start",score=0,player=null,aiFish=[],bubbles=[],seaweed=[];
const FISH_COUNT=18;

function createPlayer(){
  return {x:W/2,y:H/2,size:28,speed:4,dir:1,color:"#f4a460",tailColor:"#e8832a",grow(a){this.size+=a}};
}

const fishPalette=[
  ["#4fc3f7","#0288d1"],
  ["#81c784","#388e3c"],
  ["#e57373","#c62828"],
  ["#ffb74d","#e65100"],
  ["#ba68c8","#6a1b9a"],
  ["#4dd0e1","#00838f"],
  ["#fff176","#f9a825"],
  ["#f06292","#ad1457"]
];

function spawnFish(){
  // Sizes range around the player's current size
  var minS=Math.max(10, player.size * 0.3);
  var maxS=player.size * 2.2;
  var s=minS + Math.random()*(maxS-minS);
  var L=Math.random()<0.5;
  var p=fishPalette[Math.floor(Math.random()*fishPalette.length)];
  return {x:L?-s:W+s,y:30+Math.random()*(H-60),size:s,speed:1+Math.random()*2.5,dir:L?1:-1,color:p[0],tailColor:p[1]};
}

function initAI(){aiFish=[];for(var i=0;i<FISH_COUNT;i++)aiFish.push(spawnFish());}

function initBubbles(){
  bubbles=[];
  for(var i=0;i<25;i++)bubbles.push({x:Math.random()*W,y:Math.random()*H,r:2+Math.random()*5,speed:0.3+Math.random()*0.8,opacity:0.15+Math.random()*0.3});
}

function initSeaweed(){
  seaweed=[];
  for(var i=0;i<12;i++)seaweed.push({x:Math.random()*W,height:40+Math.random()*100,width:8+Math.random()*12,hue:100+Math.random()*40,phase:Math.random()*Math.PI*2});
}

function drawFishShape(ctx,x,y,size,dir,color,tailColor){
  ctx.save();
  ctx.translate(x,y);
  ctx.scale(dir,1);
  ctx.beginPath();
  ctx.ellipse(-size*0.05,0,size*0.7,size*0.35,0,0,Math.PI*2);
  ctx.fillStyle=color;
  ctx.fill();
  ctx.strokeStyle="rgba(0,0,0,0.2)";
  ctx.lineWidth=0.5;
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(-size*0.7,-size*0.3);
  ctx.lineTo(-size*1.05,0);
  ctx.lineTo(-size*0.7,size*0.3);
  ctx.closePath();
  ctx.fillStyle=tailColor;
  ctx.fill();
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(size*0.35,-size*0.08,size*0.1,0,Math.PI*2);
  ctx.fillStyle="#fff";
  ctx.fill();
  ctx.beginPath();
  ctx.arc(size*0.38,-size*0.08,size*0.05,0,Math.PI*2);
  ctx.fillStyle="#111";
  ctx.fill();
  ctx.restore();
}

function drawBubble(ctx,b){
  ctx.beginPath();
  ctx.arc(b.x,b.y,b.r,0,Math.PI*2);
  ctx.fillStyle="rgba(200,230,255,"+b.opacity+")";
  ctx.fill();
  ctx.strokeStyle="rgba(255,255,255,"+b.opacity*0.8+")";
  ctx.lineWidth=0.5;
  ctx.stroke();
}

function drawSeaweed(ctx,s){
  ctx.save();
  ctx.translate(s.x,H);
  for(var i=0;i<5;i++){
    var t=i/5;
    var sw=Math.sin(Date.now()*0.001+s.phase+t*2)*4;
    var h=-s.height*t;
    ctx.beginPath();
    ctx.moveTo(sw,0);
    ctx.lineTo(sw+s.width*0.5,h);
    ctx.lineWidth=(1-t)*s.width;
    ctx.strokeStyle="hsla("+s.hue+",60%,"+(20+t*15)+"%,0.7)";
    ctx.stroke();
  }
  ctx.restore();
}

function drawBackground(){
  var g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,"#0d1b3e");
  g.addColorStop(0.5,"#0c2d5a");
  g.addColorStop(1,"#062040");
  ctx.fillStyle=g;
  ctx.fillRect(0,0,W,H);
  var s=ctx.createLinearGradient(0,H-30,0,H);
  s.addColorStop(0,"#3d2b1f");
  s.addColorStop(1,"#5c4033");
  ctx.fillStyle=s;
  ctx.fillRect(0,H-30,W,30);
  seaweed.forEach(function(w){drawSeaweed(ctx,w);});
}

var keys={};
window.addEventListener("keydown",function(e){keys[e.key]=true;e.preventDefault();});
window.addEventListener("keyup",function(e){keys[e.key]=false;e.preventDefault();});

function handleInput(){
  if(keys["ArrowLeft"]||keys["a"]){player.x-=player.speed;player.dir=-1;}
  if(keys["ArrowRight"]||keys["d"]){player.x+=player.speed;player.dir=1;}
  if(keys["ArrowUp"]||keys["w"])player.y-=player.speed;
  if(keys["ArrowDown"]||keys["s"])player.y+=player.speed;
  player.x=Math.max(player.size*0.7,Math.min(W-player.size*0.7,player.x));
  player.y=Math.max(player.size*0.5,Math.min(H-player.size*0.5-30,player.y));
}

function updateAI(){
  aiFish.forEach(function(f){
    var dx=player.x-f.x;
    var dy=player.y-f.y;
    var d=Math.sqrt(dx*dx+dy*dy)||1;
    // Wander: small random offset to avoid all fish clumping
    var wander=Math.sin(Date.now()*0.002+f.size*3)*0.4;
    f.x+=(dx/d + wander)*f.speed;
    f.y+=(dy/d + wander*0.7)*f.speed*0.6;
    f.dir=dx>0?1:-1;
    f.x=Math.max(f.size*0.7,Math.min(W-f.size*0.7,f.x));
    f.y=Math.max(f.size*0.5,Math.min(H-f.size*0.5-30,f.y));
  });
}

function circlesOverlap(a,b){
  var dx=a.x-b.x;
  var dy=a.y-b.y;
  var d=Math.sqrt(dx*dx+dy*dy);
  return d<(a.size+b.size)*0.5;
}

function checkCollisions(){
  for(var i=aiFish.length-1;i>=0;i--){
    var f=aiFish[i];
    if(!circlesOverlap(player,f))continue;
    if(player.size>f.size){
      score+=Math.floor(f.size*10);
      player.grow(f.size*0.1);
      aiFish[i]=spawnFish();
    }else if(f.size>player.size){
      state="gameover";
      return;
    }
  }
}

function updateBubbles(){
  bubbles.forEach(function(b){
    b.y-=b.speed;
    if(b.y<-10){b.y=H+10;b.x=Math.random()*W;}
  });
}

function renderStart(){
  drawBackground();
  ctx.fillStyle="#fff";
  ctx.font='bold 56px "Segoe UI",sans-serif';
  ctx.textAlign="center";
  ctx.fillText("fish eat",W/2,H/2-40);
  ctx.font='18px "Segoe UI",sans-serif';
  ctx.fillStyle="rgba(255,255,255,0.6)";
  ctx.fillText("eat the small fish  •  avoid the big ones",W/2,H/2+15);
  ctx.font='14px "Segoe UI",sans-serif';
  ctx.fillStyle="rgba(255,255,255,0.4)";
  ctx.fillText("arrow keys or WASD to move",W/2,H/2+50);
  var p=Math.sin(Date.now()*0.003)*0.3+0.7;
  ctx.fillStyle="rgba(255,255,255,"+p+")";
  ctx.font='bold 22px "Segoe UI",sans-serif';
  ctx.fillText("press ENTER to start",W/2,H/2+95);
}

function renderGameover(){
  drawBackground();
  ctx.fillStyle="#ff6b6b";
  ctx.font='bold 48px "Segoe UI",sans-serif';
  ctx.textAlign="center";
  ctx.fillText("you got eaten!",W/2,H/2-40);
  ctx.fillStyle="#fff";
  ctx.font='28px "Segoe UI",sans-serif';
  ctx.fillText("score: "+score,W/2,H/2+20);
  var p=Math.sin(Date.now()*0.003)*0.3+0.7;
  ctx.fillStyle="rgba(255,255,255,"+p+")";
  ctx.font='bold 22px "Segoe UI",sans-serif';
  ctx.fillText("press ENTER to play again",W/2,H/2+65);
}

function renderPlaying(){
  drawBackground();
  bubbles.forEach(function(b){drawBubble(ctx,b);});
  aiFish.forEach(function(f){drawFishShape(ctx,f.x,f.y,f.size,f.dir,f.color,f.tailColor);});
  drawFishShape(ctx,player.x,player.y,player.size,player.dir,player.color,player.tailColor);
  ctx.fillStyle="#fff";
  ctx.font='bold 20px "Segoe UI",sans-serif';
  ctx.textAlign="left";
  ctx.fillText("score: "+score,16,30);
}

function update(){
  if(state!=="playing")return;
  handleInput();
  updateAI();
  checkCollisions();
  updateBubbles();
}

function render(){
  ctx.clearRect(0,0,W,H);
  if(state==="start")renderStart();
  else if(state==="gameover")renderGameover();
  else if(state==="playing")renderPlaying();
}

function startGame(){
  player=createPlayer();
  score=0;
  initAI();
  initBubbles();
  initSeaweed();
  state="playing";
}

window.addEventListener("keydown",function(e){
  if(e.key==="Enter"&&(state==="start"||state==="gameover"))startGame();
});

initBubbles();
initSeaweed();

(function loop(){update();render();requestAnimationFrame(loop);})();
</script>
</body>
</html>
